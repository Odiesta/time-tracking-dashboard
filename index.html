<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style/main.css" />

    <title>Frontend Mentor | Time tracking dashboard</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      .attribution {
        font-size: 0.6875rem;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card-user">
        <div class="card-user__profile">
          <div class="card-user__img-wrapper">
            <img
              src="images/image-jeremy.png"
              alt="Jeremy Image"
              class="card-user__img"
            />
          </div>
          <div class="card-user__report-wrapper">
            <h1 class="card-user__name">Jeremy Robson</h1>
            <p class="card-user__text">Report for</p>
          </div>
        </div>
        <div class="card-user__time-wrapper">
          <ul class="card-user__time-list">
            <li class="card-user__time-item">Daily</li>
            <li class="card-user__time-item card-user__time-item--active">
              Weekly
            </li>
            <li class="card-user__time-item">Monthly</li>
          </ul>
        </div>
      </div>
      <div class="card-container" id="card-container"></div>
    </div>

    <!-- <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Your Name Here</a>.
    </footer> -->

    <script src="script.js"></script>
  </body>
</html>
