<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style/main.css" />

    <title>Frontend Mentor | Time tracking dashboard</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      .attribution {
        font-size: 0.6875rem;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card-user">
        <div class="card-user__profile">
          <div class="card-user__img-wrapper">
            <img
              src="images/image-jeremy.png"
              alt="Jeremy Image"
              class="card-user__img"
            />
          </div>
          <div class="card-user__report-wrapper">
            <h1 class="card-user__name">Jeremy Robson</h1>
            <p class="card-user__text">Report for</p>
          </div>
        </div>
        <div class="card-user__time-wrapper">
          <ul class="card-user__time-list">
            <li class="card-user__time-item">Daily</li>
            <li class="card-user__time-item">Weekly</li>
            <li class="card-user__time-item">Monthly</li>
          </ul>
        </div>
      </div>
      <div class="card-container">
        <div class="card">
          <div class="card__banner card__banner--orange">
            <img
              src="images/icon-work.svg"
              alt="icon work"
              class="card__banner-img"
            />
          </div>
          <div class="card__container">
            <div class="card__header">
              <h3 class="card__activity">Work</h3>
              <img
                src="images/icon-ellipsis.svg"
                alt="ellipsis image"
                class="card__ellipsis"
              />
            </div>
            <div class="card__body">
              <h2 class="card__time">32hrs</h2>
              <p class="card__previous-time">Last Week - 36hrs</p>
            </div>
          </div>
        </div>
        <div class="card">
          <div class="card__banner card__banner--blue">
            <img
              src="images/icon-play.svg"
              alt="icon work"
              class="card__banner-img"
            />
          </div>
          <div class="card__container">
            <div class="card__header">
              <h3 class="card__activity">Play</h3>
              <img
                src="images/icon-ellipsis.svg"
                alt="ellipsis image"
                class="card__ellipsis"
              />
            </div>
            <div class="card__body">
              <h2 class="card__time">10hrs</h2>
              <p class="card__previous-time">Last Week - 36hrs</p>
            </div>
          </div>
        </div>
        <div class="card">
          <div class="card__banner card__banner--pink">
            <img
              src="images/icon-study.svg"
              alt="icon work"
              class="card__banner-img"
            />
          </div>
          <div class="card__container">
            <div class="card__header">
              <h3 class="card__activity">Study</h3>
              <img
                src="images/icon-ellipsis.svg"
                alt="ellipsis image"
                class="card__ellipsis"
              />
            </div>
            <div class="card__body">
              <h2 class="card__time">4hrs</h2>
              <p class="card__previous-time">Last Week - 7hrs</p>
            </div>
          </div>
        </div>
        <div class="card">
          <div class="card__banner card__banner--green">
            <img
              src="images/icon-exercise.svg"
              alt="icon work"
              class="card__banner-img"
            />
          </div>
          <div class="card__container">
            <div class="card__header">
              <h3 class="card__activity">Exercise</h3>
              <img
                src="images/icon-ellipsis.svg"
                alt="ellipsis image"
                class="card__ellipsis"
              />
            </div>
            <div class="card__body">
              <h2 class="card__time">4hrs</h2>
              <p class="card__previous-time">Last Week - 5hrs</p>
            </div>
          </div>
        </div>
        <div class="card">
          <div class="card__banner card__banner--purple">
            <img
              src="images/icon-social.svg"
              alt="icon work"
              class="card__banner-img"
            />
          </div>
          <div class="card__container">
            <div class="card__header">
              <h3 class="card__activity">Social</h3>
              <img
                src="images/icon-ellipsis.svg"
                alt="ellipsis image"
                class="card__ellipsis"
              />
            </div>
            <div class="card__body">
              <h2 class="card__time">5hrs</h2>
              <p class="card__previous-time">Last Week - 10hrs</p>
            </div>
          </div>
        </div>
        <div class="card">
          <div class="card__banner card__banner--yellow">
            <img
              src="images/icon-self-care.svg"
              alt="icon work"
              class="card__banner-img"
            />
          </div>
          <div class="card__container">
            <div class="card__header">
              <h3 class="card__activity">Self Care</h3>
              <img
                src="images/icon-ellipsis.svg"
                alt="ellipsis image"
                class="card__ellipsis"
              />
            </div>
            <div class="card__body">
              <h2 class="card__time">2hrs</h2>
              <p class="card__previous-time">Last Week - 2hrs</p>
            </div>
          </div>
        </div>
      </div>
    </div>

      Coded by <a href="#">Your Name Here</a>.
    </footer> -->
  </body>
</html>
